name: Sapling
options:
  bundleIdPrefix: dev.damsac
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.damsac.sapling
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
packages:
  MapLibreSwiftUI:
    url: https://github.com/maplibre/swiftui-dsl
    from: "0.24.0"
targets:
  Sapling:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
      - path: Resources/Assets.xcassets
    settings:
      base:
        # iPhone-only; iPad multitasking otherwise requires all 4 orientations
        # but we only support portrait.
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      # Override XcodeGen's target-level default of CODE_SIGN_IDENTITY=
      # "iPhone Developer". With CODE_SIGN_STYLE=Automatic, Xcode rejects
      # any explicit identity as a conflict — automatic signing must be
      # the sole authority. Empty string clears xcodegen's default.
      configs:
        Debug:
          CODE_SIGN_IDENTITY: ""
        Release:
          CODE_SIGN_IDENTITY: ""
    dependencies:
      - framework: Frameworks/SaplingCore.xcframework
        embed: false
      - package: MapLibreSwiftUI
        product: MapLibreSwiftUI
      - package: MapLibreSwiftUI
        product: MapLibreSwiftDSL
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Sapling
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: Sapling uses your location to show where you are on the map and record your trail.
        NSLocationAlwaysAndWhenInUseUsageDescription: Sapling needs background location access to keep recording your trail when the app is in your pocket.
        UIBackgroundModes:
          - location
  SaplingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    dependencies:
      - target: Sapling
      - framework: Frameworks/SaplingCore.xcframework
        embed: false
