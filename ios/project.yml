name: Sapling
options:
  bundleIdPrefix: dev.damsac
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.damsac.sapling
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  MapLibreSwiftUI:
    url: https://github.com/maplibre/swiftui-dsl
    from: "0.24.0"
targets:
  Sapling:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    dependencies:
      - framework: Frameworks/SaplingCore.xcframework
        embed: false
      - package: MapLibreSwiftUI
        product: MapLibreSwiftUI
      - package: MapLibreSwiftUI
        product: MapLibreSwiftDSL
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Sapling
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: Sapling uses your location to show where you are on the map and record your trail.
  SaplingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    dependencies:
      - target: Sapling
      - framework: Frameworks/SaplingCore.xcframework
        embed: false
