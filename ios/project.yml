name: Sapling
options:
  bundleIdPrefix: dev.damsac
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.damsac.sapling
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Sapling:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    dependencies:
      - framework: Frameworks/SaplingCore.xcframework
        embed: false
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Sapling
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
